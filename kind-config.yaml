apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster

# 1. Disattiva la rete standard di KinD per far funzionare Cilium
networking:
  disableDefaultCNI: true
  kubeProxyMode: "none"  

# 2. Struttura dei Nodi (1 Control-Plane + 3 Worker per Longhorn e Traefik)
nodes:
- role: control-plane
  image: kindest/node:v1.31.2@sha256:18fbefc20a7113353c7b75b5c869d7145a6abd6269154825872dc59c1329912e

# Worker 1: Dedicato anche a ricevere il traffico HTTP/HTTPS esterno per Traefik
- role: worker
  image: kindest/node:v1.31.2@sha256:18fbefc20a7113353c7b75b5c869d7145a6abd6269154825872dc59c1329912e
  extraPortMappings:
  - containerPort: 30080 # La porta mappata su Traefik (NodePort)
    hostPort: 80         # La porta del tuo PC
    protocol: TCP
  - containerPort: 30443 # La porta mappata su Traefik (NodePort)
    hostPort: 443        # La porta del tuo PC
    protocol: TCP
  extraMounts:
  - hostPath: ./data/worker1
    containerPath: /var/lib/longhorn


kubeProxyReplacement: true
identityAllocationMode: crd
routingMode: tunnel

# 2. Configurazione Integrazione API Server
k8sServiceHost: ""
k8sServicePort: 6443

# 3. Gestione IPAM e Mascheramento (Risolve l'isolamento Internet/DNS)
ipam:
  mode: kubernetes

bpf:
  masquerade: true
  disableChecksumOffloading: true

operator:
  replicas: 1

ingressController:
  enabled: false

hubble:
  enabled: true
  metrics:
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - icmp
      - http
  relay:
    enabled: true
  ui:
    enabled: true
    backend:
      replicas: 1
    frontend:
      replicas: 1

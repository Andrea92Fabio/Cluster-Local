apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"

spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik

  sources:
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: 34.0.0
      helm:
        valueFiles:
          - $my-git/apps/traefik/values.yaml
    - repoURL: https://github.com/Andrea92Fabio/Cluster-Local.git
      targetRevision: HEAD
      ref: my-git

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true

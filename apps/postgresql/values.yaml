# Configurazione di autenticazione base per sviluppo locale
auth:
  database: my_database
  username: my_user
  # In produzione useresti Sealed Secrets, qui ne definiamo una di fallback per il bootstrap rapido
  password: "PasswordSicura123" 

primary:
  # Richiede lo storage a Longhorn
  persistence:
    enabled: true
    storageClass: longhorn
    size: 8Gi
  
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
      
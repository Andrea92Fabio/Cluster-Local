# Configurazione Globale di Prometheus
prometheus:
  prometheusSpec:
    replicas: 1
    retention: 2d
    retentionSize: 2GiB
    
    resources:
      requests:
        cpu: "150m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          resources:
            requests:
              storage: 5Gi

grafana:
  adminPassword: "AdminPassword123"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

  persistence:
    enabled: true
    storageClassName: longhorn
    size: 2Gi

  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.local
    path: /
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web

alertmanager:
  enabled: false